# =====================================================================
# CI: compila los 3 microservicios y ejecuta todos los tests
# en cada push y pull request a main.
# =====================================================================
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-y-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compilar y ejecutar tests (los 3 modulos)
        run: mvn -B verify

      - name: Publicar reportes de tests si algo fallo
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reportes-surefire
          path: '**/target/surefire-reports/'
