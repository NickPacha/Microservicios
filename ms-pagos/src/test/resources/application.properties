# Perfil de test: H2 EN MEMORIA (no escribe ficheros, se recrea en cada arranque).
spring.datasource.url=jdbc:h2:mem:pagos_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
