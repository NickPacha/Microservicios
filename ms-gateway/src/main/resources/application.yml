server:
  port: 8080

spring:
  application:
    name: ms-gateway

  cloud:
    gateway:
      # URIs configurables por entorno: en local usan localhost;
      # en Docker Compose se inyectan los nombres de contenedor.
      routes:
        # ---------- ms-reserva ----------
        - id: reservas
          uri: ${RESERVA_URI:http://localhost:8083}
          predicates:
            - Path=/api/reservas/**

        # Login/registro dev: viven en ms-reserva
        - id: dev-auth
          uri: ${RESERVA_URI:http://localhost:8083}
          predicates:
            - Path=/dev/**

        # ---------- ms-pagos ----------
        - id: pagos
          uri: ${PAGOS_URI:http://localhost:8084}
          predicates:
            - Path=/api/pagos/**

# Clave DEV compartida para validar el JWT en el perimetro.
# En produccion: issuer-uri/jwk-set-uri de Keycloak, no clave simetrica.
app:
  security:
    dev-secret: ${DEV_SECRET:clave-secreta-de-desarrollo-para-ms-reserva-256bits!!}

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
